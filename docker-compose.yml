version: '3.8'

services:
  presidio-analyzer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: presidio-analyzer
    restart: unless-stopped
    mem_limit: 2g
    cpus: 2
    networks:
      - procedures_demo
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 90s

  presidio-anonymizer:
    image: mcr.microsoft.com/presidio-anonymizer:latest
    container_name: presidio-anonymizer
    restart: unless-stopped
    mem_limit: 512m
    networks:
      - procedures_demo

networks:
  procedures_demo:
    external: true
    name: openwebui_procedures_demo
